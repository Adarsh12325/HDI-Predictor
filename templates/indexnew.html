<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Development Index Predictor - Input</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="navbar">
        <a href="/Home">Home</a>
        <a href="/Prediction">Predict</a>
    </div>
    
    <div class="container">
        <h1 class="header-title">Human Development Index</h1>
        <p class="header-subtitle">Enter socioeconomic parameters to run the machine learning prediction model</p>
        
        <div class="glass-card">
            {% if error %}
            <div class="alert-error">
                <strong>Validation Error:</strong> {{ error }}
            </div>
            {% endif %}
            
            <form class="prediction-form" action="/predict" method="post">
                <div class="form-group">
                    <label for="Country">Country Context</label>
                    <select id="Country" name="Country">
                        <option value="">Select the name of the Country</option>
                        <option value="0">Afghanistan</option>
                        <option value="8">Australia</option>
                        <option value="13">Bangladesh</option>
                        <option value="31">Canada</option>
                        <option value="76">India</option>
                        <option value="138">Poland</option>
                        <option value="179">Turkey</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="life_exp">Life Expectancy at Birth (Years)</label>
                    <input class="form-input" id="life_exp" type="text" name="Life expectancy" placeholder="Enter life expectancy rate(range 50-89)">
                </div>
                
                <div class="form-group">
                    <label for="mean_school">Mean Years of Schooling (Years)</label>
                    <input class="form-input" id="mean_school" type="text" name="Mean years of schooling" placeholder="Enter Mean years of schooling(range 1-15)">
                </div>
                
                <div class="form-group">
                    <label for="gni">Gross National Income (GNI) per Capita (PPP $)</label>
                    <input class="form-input" id="gni" type="text" name="Gross national income (GNI) per capita" placeholder="Enter GNI(range 293-120000)">
                </div>
                
                <div class="form-group">
                    <label for="internet">Internet Users (% of Population)</label>
                    <input class="form-input" id="internet" type="text" name="Internet users" placeholder="Enter the number of internet users">
                </div>
                
                <input type="submit" class="submit-btn" value="Predict">
            </form>
        </div>
    </div>
</body>
</html>
